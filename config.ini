# Windows 自动化测试配置文件
# 将此文件与 run_tests.exe 放在同一目录
# 根据实际环境修改以下路径

[apps]
# WPS 办公套件
wps     = C:\Program Files\WPS Office\office6\wps.exe
wpp     = C:\Program Files\WPS Office\office6\wpp.exe
et      = C:\Program Files\WPS Office\office6\et.exe

# 视频播放器（客户端）
qqvideo = C:\Program Files (x86)\Tencent\QQlive\QQlive.exe

# 浏览器
chrome  = C:\Program Files\Google\Chrome\Application\chrome.exe
ie      = C:\Program Files\Internet Explorer\iexplore.exe

# 和彩云
caiyun  = C:\Program Files\ChinaMobile\HeyCloud\HeyCloud.exe

[media]
# 测试视频和文档（需提前放好）
test_video_720p  = D:\test_videos\test_720p.mp4
test_video_1080p = D:\test_videos\test_1080p.mp4
test_doc_word    = D:\test_docs\test.docx
test_doc_excel   = D:\test_docs\test.xlsx
test_doc_ppt     = D:\test_docs\test.pptx

[timing]
# 各操作等待时间（秒），机器慢可以适当调大
launch_wait     = 3.0
page_load_wait  = 5.0
action_wait     = 0.5
video_play_wait = 10.0

[output]
# 截图和报告输出目录（留空则自动放到 exe 同级的 output 文件夹）
screenshot_dir =
report_dir     =
