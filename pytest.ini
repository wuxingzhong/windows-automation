[pytest]
testpaths = tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
log_cli_date_format = %H:%M:%S

# 自定义 marker
markers =
    window:   窗口操作相关测试
    player:   本地播放器测试
    browser:  浏览器在线视频测试
    ie:       IE 浏览器测试
    office:   办公应用测试

# 失败时继续执行其他测试
addopts = --tb=short -v
